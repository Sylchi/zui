<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZUI Component Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f14;color:#e0e0e8;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#2d1b4e);border-bottom:1px solid rgba(124,58,237,.3);padding:1rem 2rem;display:flex;align-items:center;gap:1rem}
header h1{font-size:1.2rem;font-weight:600;background:linear-gradient(90deg,#c084fc,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{color:#666;font-size:.8rem}
header .status{margin-left:auto;font-size:.75rem;padding:.25rem .6rem;border-radius:5px;background:rgba(34,197,94,.15);color:#4ade80}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.06);padding:0 2rem;background:rgba(0,0,0,.2)}
.tab{padding:.6rem 1.2rem;cursor:pointer;font-size:.8rem;color:#666;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:#aaa}
.tab.on{color:#c084fc;border-bottom-color:#7c3aed}
.main{display:grid;grid-template-columns:1fr 280px;height:calc(100vh-108px)}
.canvas-wrap{display:flex;align-items:center;justify-content:center;background:#0a0a0f;position:relative;overflow:hidden;padding:1rem}
canvas{border-radius:8px;image-rendering:auto;box-shadow:0 0 80px rgba(124,58,237,.06)}
.sidebar{padding:1rem;overflow-y:auto;border-left:1px solid rgba(255,255,255,.06)}
.sidebar h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:.5rem}
.sidebar h3{font-size:.75rem;color:#777;margin:1rem 0 .35rem}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.stat{background:rgba(255,255,255,.03);border-radius:5px;padding:.4rem}
.stat .l{font-size:.6rem;color:#555;text-transform:uppercase}
.stat .v{font-size:.8rem;color:#c084fc;margin-top:2px}
.cmd-list{font-size:.65rem;font-family:monospace}
.cmd{border-bottom:1px solid rgba(255,255,255,.03);padding:2px 0;display:flex;gap:4px}
.cmd .t{color:#7c3aed;font-weight:600;min-width:5rem}
.cmd .d{color:#888;overflow:hidden;text-overflow:ellipsis}
.cmd .c{margin-left:auto;color:#555}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
.tip{color:#444;font-size:.7rem;text-align:center;padding:2rem}
canvas{cursor:crosshair}
</style>
</head>
<body>

<header>
  <h1>ZUI Gallery</h1><span style="font-size:.7rem;color:#666">v0.1</span>
  <span class="sub">Real command stream · Components · Icons · Variants</span>
  <span class="status" id="status">Loading...</span>
</header>

<div class="tabs" id="tabs"></div>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="c" width="640" height="520"></canvas>
  </div>
  <div class="sidebar">
    <h2>Stats</h2>
    <div class="stat-grid" id="stats"></div>
    <h3>Hovered Slot</h3>
    <div id="slotInfo"><div class="tip">Hover a component on canvas</div></div>
    <h3>Command Stream</h3>
    <div class="cmd-list" id="cmdList"><div class="tip">Hover to see commands</div></div>
  </div>
</div>

<script>
if(!CanvasRenderingContext2D.prototype.roundRect)
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);return this}
</script>
<script type="module">
import init from '../../dist/zui.mjs';

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const tabsEl=document.getElementById('tabs');
const statsEl=document.getElementById('stats');
const cmdListEl=document.getElementById('cmdList');
const slotInfoEl=document.getElementById('slotInfo');
const statusEl=document.getElementById('status');

let zui,curTab='gallery';
let slotMap=[]; // {slot,path,type,bounds,cmds}

function rgba(c,a=(c.a??255)/255){return `rgba(${c.r},${c.g},${c.b},${a})`}

function ws(s){const e=new TextEncoder(),b=e.encode(s);const m=new Uint8Array(zui.memoryBuffer);const p=m.length-b.length-1;m.set(b,p);m[p+b.length]=0;return{ptr:p>>>0,len:b.length}}

// ── Tab definitions ───────────────────────────────────────

const TABS={
  gallery:{
    label:'🎨 Gallery',
    build(){
      const e=zui.wasmExports;
      const entries=[
        {type:'text',label:'Regular weight',value:'Regular text',width:280},
        {type:'text',label:'Semibold',value:'Semibold text',weight:'semibold'},
        {type:'text',label:'Bold',value:'Bold text',weight:'bold'},
      ];
      for(let i=0;i<6;i++)entries.push({type:'button',label:['Primary','Secondary','Outline','Ghost','Destructive','Link'][i],variant:i,width:140});
      entries.push({type:'separator'});
      for(let i=0;i<6;i++)entries.push({type:'badge',label:['Default','Secondary','New','Outline','Ghost','Link'][i],variant:i,width:90});
      entries.push({type:'separator'});
      entries.push({type:'input',placeholder:'Search...',width:280});
      entries.push({type:'checkbox',label:'Enable notifications',checked:true});
      entries.push({type:'slider',label:'Volume',value:.65});
      entries.push({type:'separator'});
      entries.push({type:'card',title:'System Status',detail:'CPU 23% · RAM 1.2GB · 12d uptime'});
      entries.push({type:'row_item',title:'Active Users',detail:'42'});
      entries.push({type:'icon',label:'Heart',iconValue:9829},{type:'icon',label:'Star',iconValue:9733});
      return entries;
    }
  },
  buttons:{
    label:'🔘 Buttons',
    build(){
      const entries=[];
      for(let v=0;v<6;v++){
        const labels=['Primary','Secondary','Outline','Ghost','Destructive','Link'];
        entries.push({type:'button',label:`${labels[v]}`,variant:v,width:180});
        entries.push({type:'button',label:`${labels[v]} + icon`,variant:v,leadingIcon:1,width:220});
      }
      return entries;
    }
  },
  badges:{
    label:'🏷️ Badges',
    build(){
      return[0,1,2,3,4,5].map(v=>({type:'badge',label:['Default','Secondary','New','Outline','Ghost','Link'][v],variant:v,width:110}));
    }
  },
  icons:{
    label:'🔣 Icons',
    build(){
      const icons=[{n:'Heart',v:9829},{n:'Star',v:9733},{n:'Check',v:10003},{n:'Bell',v:9830},{n:'Settings',v:9881},{n:'User',v:9787},{n:'Home',v:8987},{n:'Search',v:128269},{n:'Mail',v:9993},{n:'Clock',v:9201},{n:'Music',v:9835},{n:'Gear',v:9883},{n:'Tag',v:9776},{n:'Lock',v:128274},{n:'Key',v:9882},{n:'Pen',v:9998}];
      return icons.map(i=>({type:'icon',label:i.n,iconValue:i.v}));
    }
  },
  form:{
    label:'📋 Form',
    build(){
      return[
        {type:'card',title:'Create Account',detail:'Fill in the details below'},
        {type:'input',placeholder:'Username',width:400},
        {type:'input',placeholder:'Email',width:400},
        {type:'input',placeholder:'Password',width:400},
        {type:'checkbox',label:'Subscribe to newsletter',checked:true,width:400},
        {type:'slider',label:'Volume',value:.5,width:400},
        {type:'separator'},
        {type:'button',label:'Create Account',variant:0,width:200},
        {type:'button',label:'Cancel',variant:2,width:120},
      ];
    }
  }
};

function buildTabs(){
  tabsEl.innerHTML='';
  for(const[k,v]of Object.entries(TABS)){
    const t=document.createElement('div');
    t.className='tab'+(k===curTab?' on':'');
    t.textContent=v.label;
    t.onclick=()=>{curTab=k;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');render();};
    tabsEl.appendChild(t);
  }
}

// ── Rendering pipeline ────────────────────────────────────

function render(){
  const e=zui.wasmExports,W=canvas.width,H=canvas.height;
  e.er_ui_wasm_clear();
  slotMap=[];

  const entries=TABS[curTab].build();
  let x=16,y=16,gap=8;

  for(const node of entries){
    if(node.type==='separator'){y+=8;continue;}
    const slot=e.er_ui_wasm_alloc();
    if(slot<0)break;

    const w=node.width??200,h=node.height??0;
    switch(node.type){
      case 'text':{const s=ws(node.value);e.er_ui_wasm_new_text(slot,s.ptr,s.len);break}
      case 'button':{const s=ws(node.label);e.er_ui_wasm_new_button(slot,1,s.ptr,s.len,node.variant??0,node.leadingIcon??0,node.trailingIcon??0);break}
      case 'input':{const s=ws(node.placeholder??'');e.er_ui_wasm_new_input(slot,1,s.ptr,s.len);break}
      case 'card':{const t=ws(node.title),d=ws(node.detail??'');e.er_ui_wasm_new_card(slot,t.ptr,t.len,d.ptr,d.len);break}
      case 'badge':{const s=ws(node.label);e.er_ui_wasm_new_badge(slot,s.ptr,s.len,node.variant??0);break}
      case 'checkbox':{const s=ws(node.label);e.er_ui_wasm_new_checkbox(slot,1,s.ptr,s.len,node.checked?1:0);break}
      case 'slider':{const s=ws(node.label??'');e.er_ui_wasm_new_slider(slot,1,s.ptr,s.len,node.value??.5);break}
      case 'icon':{const s=ws(node.label);e.er_ui_wasm_new_icon(slot,s.ptr,s.len,node.iconValue);break}
      case 'row_item':{const t=ws(node.title),d=ws(node.detail??'');e.er_ui_wasm_new_row_item(slot,1,t.ptr,t.len,d.ptr,d.len);break}
    }

    // Measure
    const packed=e.er_ui_wasm_measure(slot,w,-1);
    const mw=Number(packed>>32n),mh=Number(packed&0xFFFFFFFFn);
    const pw=new Float32Array(new Uint32Array([mw]).buffer)[0];
    const ph=new Float32Array(new Uint32Array([mh]).buffer)[0];
    const cw=isNaN(pw)||pw<=0?w:Math.min(pw,W-2*16);
    const ch=isNaN(ph)||ph<=0?24:ph;

    // Layout: wrap to next row if needed
    if(x+cw>W-16){x=16;y+=ch+gap}
    const bx=x,by=y;

    // Render & read commands
    const cmdCount=e.er_ui_wasm_render(slot,0,0,bx,by,cw,ch);
    const cmds=zui.readCommands(cmdCount);

    slotMap.push({slot,path:node.label||node.type,type:node.type,bounds:{x:bx,y:by,w:cw,h:ch},cmds,node});

    x+=cw+gap;
    if(x>=W-16){x=16;y+=ch+gap}
  }

  drawCanvas();
  updateStats();
  cmdListEl.innerHTML='<div class="tip">Hover a component to see commands</div>';
  slotInfoEl.innerHTML='<div class="tip">Hover a component on canvas</div>';
}

// ── Canvas drawing ────────────────────────────────────────

function drawCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0f0f14';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Dot grid
  ctx.fillStyle='rgba(255,255,255,.015)';
  for(let x=0;x<canvas.width;x+=24)
    for(let y=0;y<canvas.height;y+=24)
      ctx.fillRect(x,y,1,1);

  // Tab label
  ctx.fillStyle='rgba(255,255,255,.03)';
  ctx.fillRect(0,0,canvas.width,28);
  ctx.fillStyle='#555';
  ctx.font='11px system-ui';
  ctx.textBaseline='middle';
  const tabLabel=Object.entries(TABS).find(([k])=>k===curTab)?.[1]?.label||'';
  ctx.fillText(`${tabLabel}  ·  ${slotMap.length} components`,12,14);

  for(const entry of slotMap){
    drawCmds(entry);
  }
}

function drawCmds(entry){
  for(const cmd of entry.cmds){
    try{
      const b=cmd.bounds||cmd.origin||{};
      if(b.x===undefined)continue;
      switch(cmd.type){
        case 'rect':
        case 'overlay_rect':{
          ctx.fillStyle=rgba(cmd.color??{r:255,g:255,b:255,a:255});
          const r=cmd.radius??0;
          if(r>0){ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,Math.min(r,12));ctx.fill()}
          else ctx.fillRect(b.x,b.y,b.w,b.h);
          break;
        }
        case 'border':{
          ctx.strokeStyle=rgba(cmd.color??{r:255,g:255,b:255,a:255});
          ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.stroke();
          break;
        }
        case 'text':
        case 'overlay_text':{
          ctx.font='400 13px system-ui';ctx.textBaseline='middle';
          ctx.fillStyle=rgba(cmd.color??{r:255,g:255,b:255,a:255});
          const tx=cmd.alignment===0?b.x+4:cmd.alignment===2?b.x+b.w-4:b.x+b.w/2;
          ctx.textAlign=['start','center','end'][cmd.alignment]??'start';
          ctx.fillText(cmd.value||'',tx,b.y+b.h/2);
          ctx.textAlign='start';
          break;
        }
        case 'icon_quad':
        case 'overlay_icon_quad':
        case 'svg_quad':{
          ctx.fillStyle=rgba(cmd.color??{r:255,g:255,b:255,a:255},.3);
          ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
          ctx.strokeStyle=rgba(cmd.color??{r:255,g:255,b:255,a:255},.5);
          ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.stroke();
          ctx.fillStyle=rgba(cmd.color??{r:255,g:255,b:255,a:255});
          ctx.font='bold 12px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(String.fromCodePoint(cmd.iconId??63),b.x+b.w/2,b.y+b.h/2);
          ctx.textAlign='start';
          break;
        }
        case 'text_quad':
        case 'image_quad':{
          ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(b.x,b.y,b.w,b.h);
          ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);
          break;
        }
        case 'drag_source':case 'drop_target':{
          ctx.strokeStyle='rgba(124,58,237,.3)';ctx.lineWidth=1;ctx.setLineDash([2,3]);
          ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.setLineDash([]);
          break;
        }
      }
    }catch(e){}
  }
}

// ── Hover hit testing ─────────────────────────────────────

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width;
  const sy=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;

  let found=null;
  for(const entry of slotMap){
    const b=entry.bounds;
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){found=entry}
  }

  if(found){
    // Highlight
    drawCanvas();
    const b=found.bounds;
    ctx.strokeStyle='rgba(124,58,237,.4)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.roundRect(b.x-2,b.y-2,b.w+4,b.h+4,6);ctx.stroke();ctx.setLineDash([]);

    // Tooltip
    ctx.fillStyle='rgba(0,0,0,.8)';
    const tx=b.x+4<canvas.width/2?b.x+b.w+8:b.x-160;
    const ty=Math.max(4,b.y-30);
    ctx.beginPath();ctx.roundRect(tx,ty,155,24,4);ctx.fill();
    ctx.fillStyle='#c084fc';ctx.font='11px system-ui';ctx.textBaseline='middle';
    ctx.fillText(`${found.type}  ·  ${found.cmds.length} cmds`,tx+6,ty+12);

    // Sidebar info
    let total=found.cmds.length;
    let txt=found.cmds.filter(c=>c.type==='text').length;
    let ico=found.cmds.filter(c=>c.type.includes('icon_quad')||c.type==='svg_quad').length;
    let rct=found.cmds.filter(c=>c.type==='rect'||c.type==='overlay_rect').length;

    slotInfoEl.innerHTML=`
      <div class="stat"><div class="l">Type</div><div class="v">${found.type}</div></div>
      <div class="stat"><div class="l">Label</div><div class="v">${found.path||'—'}</div></div>
      <div class="stat"><div class="l">Slot</div><div class="v">${found.slot}</div></div>
      <div class="stat"><div class="l">Commands</div><div class="v">${total}</div></div>
      <div class="stat"><div class="l">Rects</div><div class="v">${rct}</div></div>
      <div class="stat"><div class="l">Texts</div><div class="v">${txt}</div></div>
      <div class="stat"><div class="l">Icons</div><div class="v">${ico}</div></div>
      <div class="stat" style="grid-column:1/-1"><div class="l">Bounds</div><div class="v">(${b.x.toFixed(0)},${b.y.toFixed(0)},${b.w.toFixed(0)},${b.h.toFixed(0)})</div></div>`;

    // Command list
    let ch='';
    for(const c of found.cmds){
      const bb=c.bounds||c.origin||{};
      ch+=`<div class="cmd"><span class="t">${c.type}</span>`;
      if(c.value)ch+=`<span class="d">"${c.value.substring(0,20)}"</span>`;
      if(c.iconId!==undefined)ch+=`<span class="d">#${c.iconId}</span>`;
      ch+=`<span class="c">${bb.w!==undefined?bb.w.toFixed(0)+'×'+bb.h.toFixed(0):''}</span></div>`;
    }
    cmdListEl.innerHTML=ch;
  }else{
    if(slotInfoEl.querySelector('.stat')){drawCanvas();slotInfoEl.innerHTML='<div class="tip">Hover a component</div>';cmdListEl.innerHTML='<div class="tip">Hover a component</div>'}
  }
});

// ── Stats ─────────────────────────────────────────────────

function updateStats(){
  let totalCmds=0,slots=slotMap.length;
  const typeCount={};
  for(const e of slotMap){
    totalCmds+=e.cmds.length;
    typeCount[e.type]=(typeCount[e.type]??0)+1;
  }
  statsEl.innerHTML=`
    <div class="stat"><div class="l">Components</div><div class="v">${slots}</div></div>
    <div class="stat"><div class="l">Commands</div><div class="v">${totalCmds}</div></div>
    <div class="stat"><div class="l">Types</div><div class="v">${Object.keys(typeCount).length}</div></div>
    <div class="stat"><div class="l">Canvas</div><div class="v">${canvas.width}×${canvas.height}</div></div>
    <div class="stat" style="grid-column:1/-1"><div class="l">Composition</div><div class="v">${Object.entries(typeCount).map(([k,v])=>`${k}:${v}`).join(' · ')}</div></div>`;
}

// ── Init ──────────────────────────────────────────────────

async function main(){
  try{
    zui=await init('../../dist/zui.wasm');
    statusEl.textContent='✅ Ready';
    buildTabs();
    render();
  }catch(e){statusEl.textContent='❌ Error';console.error(e)}
}
main();
</script>
</body>
</html>
