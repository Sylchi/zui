<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ZUI Todo Example</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; background: #f5f5f5; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .controls { display: flex; gap: 8px; margin-bottom: 1rem; }
  .controls input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  .controls button { padding: 8px 16px; background: #7c3aed; color: white; border: none; border-radius: 6px; cursor: pointer; }
  .controls button:hover { background: #6d28d9; }
  pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  #status { font-size: 0.9rem; color: #666; margin-bottom: 1rem; }
  #results { margin: 1rem 0; }
  .todo-slot { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 0.5rem 0.75rem; margin: 0.25rem 0; display: flex; align-items: center; gap: 8px; }
  .todo-slot .idx { color: #999; font-size: 0.75rem; min-width: 1.5rem; }
  .todo-slot .type { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: #666; }
  .todo-slot .label { flex: 1; font-size: 0.85rem; }
  .todo-slot .meta { color: #999; font-size: 0.75rem; }
</style>
</head>
<body>
  <h1>📋 ZUI Todo</h1>
  <p id="status">⏳ Loading ZUI...</p>

  <div class="controls">
    <input type="text" id="todoInput" placeholder="Add a todo item..." />
    <button id="addBtn">Add</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div id="results"></div>
  <pre id="log">Waiting...</pre>

  <script type="module">
    import init from '../../dist/zui.mjs';

    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');

    let zui;
    let todos = [];
    let nextId = 1;

    function appendLog(msg) {
      log.textContent += '\n' + msg;
    }

    function update() {
      // Build tree from todos array
      const children = [];

      // Header
      children.push({ type: 'text', value: `Todo (${todos.length} items)`, width: 500 });

      // Todo items as checkbox + text rows
      for (let i = 0; i < todos.length; i++) {
        const t = todos[i];
        children.push({
          type: 'checkbox',
          id: t.id,
          label: t.text,
          checked: t.done,
          width: 500,
        });
      }

      if (todos.length === 0) {
        children.push({ type: 'text', value: 'No items yet. Add one above!', width: 500 });
      }

      children.push({ type: 'separator' });
      children.push({
        type: 'row_item',
        id: 0,
        title: 'Total items',
        detail: `${todos.length}`,
      });

      zui.setTree({ type: 'column', gap: 4, padding: 12, children });
      const renderResults = zui.renderAll(500, 600);

      // Display results
      results.innerHTML = '';
      for (const r of renderResults) {
        if (r.commandCount <= 0) continue;
        const div = document.createElement('div');
        div.className = 'todo-slot';
        div.innerHTML = `<span class="idx">#${r.slot}</span>
          <span class="type">${r.type}</span>
          <span class="meta">${r.commandCount}cmds @ ${r.bounds.x.toFixed(0)},${r.bounds.y.toFixed(0)}</span>`;
        results.appendChild(div);
      }

      appendLog(`Rendered ${renderResults.length} slots (${todos.length} todos)`);
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, done: false });
      todoInput.value = '';
      update();
    }

    function clearTodos() {
      todos = [];
      update();
    }

    try {
      zui = await init('../../dist/zui.wasm');
      status.textContent = '✅ ZUI loaded — add some todos!';
      appendLog(`ZUI v${zui.version} loaded`);

      // Initial render
      update();

      // Event handlers
      addBtn.addEventListener('click', addTodo);
      clearBtn.addEventListener('click', clearTodos);
      todoInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });

      appendLog('Ready — type a todo and hit Enter');
    } catch (err) {
      status.textContent = '❌ Error';
      appendLog(`Error: ${err.message}`);
      console.error(err);
    }
  </script>
</body>
</html>
